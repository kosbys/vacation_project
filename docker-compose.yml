services:
  client:
    build:
      context: ./client
    ports:
      - "5173:5173"
    depends_on:
      - server
  server:
    build:
      context: ./server
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_NAME=vacation_app
    volumes:
      - ./server/public:/app/public
